# Default values for the agritech chart.
# Environment-specific overrides live in values-dev.yaml / values-prod.yaml
# Deploy with: helm upgrade --install agritech ./helm/agritech -f helm/agritech/values-<env>.yaml

nameOverride: ""
fullnameOverride: ""

environment: dev

backend:
  image:
    repository: agritech-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    SPRING_PROFILES_ACTIVE: dev
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75

frontend:
  image:
    repository: agritech-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75

ingress:
  enabled: true
  className: nginx
  host: agritech-marketplace.local
  tls:
    enabled: false
    secretName: ""

database:
  host: mysql-service
  port: 3306
  name: agritech
  secretName: agritech-db-secret

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
