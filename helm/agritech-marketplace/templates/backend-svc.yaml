apiVersion: v1
kind: Service
metadata:
  name: agritech-backend-svc
  labels:
    {{- include "agritech.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "agritech.name" . }}
    component: backend
  ports:
    - port: 8080
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
