name: Deploy - AgriTech Marketplace (EKS)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  BACKEND_IMAGE: agritech-backend
  FRONTEND_IMAGE: agritech-frontend

jobs:
  # ---------------------------------------------------------------
  backend-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        working-directory: app/backend
        run: mvn -B clean verify

  # ---------------------------------------------------------------
  frontend-lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate static files exist
        working-directory: app/frontend
        run: |
          test -f nginx.conf || (echo "nginx.conf missing" && exit 1)
          test -d src || (echo "src directory missing" && exit 1)
          test -f Dockerfile || (echo "Dockerfile missing" && exit 1)
          echo "Static frontend files present"

  # ---------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    needs: [backend-test, frontend-lint]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    permissions:
      id-token: write   # required for OIDC login to AWS
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        working-directory: app/backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend image
        working-directory: app/frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  # ---------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine target environment
        id: env
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then ENVIRONMENT="prod"; else ENVIRONMENT="dev"; fi
          fi
          echo "name=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Ensure namespace exists
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name agritech-${{ steps.env.outputs.name }}-eks
          kubectl apply -f k8s/namespace.yaml

      - name: Set up Helm
        # Note: this action just installs the Helm CLI binary — it works the
        # same regardless of which cloud/cluster you target.
        uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"

      - name: Helm upgrade/install
        run: |
          helm upgrade --install agritech-marketplace ./helm/agritech-marketplace \
            -f ./helm/agritech-marketplace/values-${{ steps.env.outputs.name }}.yaml \
            --set backend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --namespace agritech-${{ steps.env.outputs.name }} \
            --create-namespace \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/agritech-marketplace-backend -n agritech-${{ steps.env.outputs.name }}
          kubectl rollout status deployment/agritech-marketplace-frontend -n agritech-${{ steps.env.outputs.name }}


        
