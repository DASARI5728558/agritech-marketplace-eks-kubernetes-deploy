# Template only — do NOT commit real credentials.
# Create the real secret imperatively instead:
#
#   kubectl create secret generic agritech-db-secret \
#     --from-literal=username=agritech_admin \
#     --from-literal=password='<your-rds-password>' \
#     -n agritech-dev
#
# Or, to apply this file after filling in base64 values:
#   echo -n 'agritech_admin' | base64
#   echo -n 'your-password'  | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: agritech-db-secret
  namespace: agritech-dev
type: Opaque
data:
  username: <BASE64_ENCODED_USERNAME>
  password: <BASE64_ENCODED_PASSWORD>
